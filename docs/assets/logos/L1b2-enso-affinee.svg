<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ChillBTC logo L1b2 enso affinee">
  <title>ChillBTC L1b2 — Ensō affinée (trait fin, encre subtile, flou réduit)</title>
  <defs>
    <filter id="ink-fine" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="1.6" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.6"/>
    </filter>
  </defs>
  <!-- pas de trace fantôme cette fois : trop salissait le rendu -->
  <!-- ensō : trait fin (2.8px), encre brun-noir subtil #241B17, rugosité très discrète -->
  <path d="M 160.6,135 A 70,70 0 1 0 100,170"
        stroke="#241B17" stroke-width="2.8" fill="none"
        stroke-linecap="round" opacity="0.95"
        filter="url(#ink-fine)"/>
  <!-- ₿ très discret en signature, plus petit, opacité plus basse -->
  <text x="100" y="116" text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="400" font-size="44" fill="#F7931A" opacity="0.78">₿</text>
</svg>
