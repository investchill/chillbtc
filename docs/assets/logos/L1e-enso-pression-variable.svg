<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ChillBTC logo L1e enso pression variable">
  <title>ChillBTC L1e — Ensō pression variable du pinceau</title>
  <defs>
    <filter id="sumi-e" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
  </defs>
  <!-- segment 1 : début du trait, pression légère (4h → 1h30) -->
  <path d="M 160.6,135 A 70,70 0 0 0 154,40"
        stroke="#2B1F1B" stroke-width="3" fill="none"
        stroke-linecap="round" opacity="0.78"
        filter="url(#sumi-e)"/>
  <!-- segment 2 : sommet, pression maximum (1h30 → 10h30, traverse 12h) -->
  <path d="M 154,40 A 70,70 0 0 0 46,40"
        stroke="#1A1410" stroke-width="7" fill="none"
        stroke-linecap="round" opacity="0.97"
        filter="url(#sumi-e)"/>
  <!-- segment 3 : descente gauche, pression moyenne -->
  <path d="M 46,40 A 70,70 0 0 0 30,100"
        stroke="#1F1814" stroke-width="5" fill="none"
        stroke-linecap="round" opacity="0.9"
        filter="url(#sumi-e)"/>
  <!-- segment 4 : fin du trait, lift du pinceau (9h → 6h) -->
  <path d="M 30,100 A 70,70 0 0 0 100,170"
        stroke="#2B1F1B" stroke-width="2.5" fill="none"
        stroke-linecap="round" opacity="0.65"
        filter="url(#sumi-e)"/>
  <!-- petit dépôt d'encre à la fin du trait (signature pinceau) -->
  <circle cx="103" cy="172" r="2" fill="#2B1F1B" opacity="0.75"/>
  <circle cx="98" cy="174" r="1.2" fill="#2B1F1B" opacity="0.5"/>
</svg>
