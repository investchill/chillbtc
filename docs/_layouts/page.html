<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — ChillBTC</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/brand/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="alternate icon" href="{{ '/assets/brand/favicon-32.png' | relative_url }}" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/brand/apple-touch-icon.png' | relative_url }}">

  <!-- OpenGraph / Twitter -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ page.title }} — ChillBTC">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ '/assets/brand/og-image.png' | absolute_url }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="ChillBTC">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} — ChillBTC">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ '/assets/brand/og-image.png' | absolute_url }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
</head>
<body>

  <!-- ============== NAV TOP ============== -->
  <nav class="topnav" aria-label="Navigation principale">
    <div class="wrap">
      <a href="{{ '/' | relative_url }}" class="brand" aria-label="ChillBTC accueil">
        <img src="{{ '/assets/brand/chillbtc.svg' | relative_url }}" alt="" class="brand-logo">
        <span class="brand-name">ChillBTC</span>
      </a>
      <div class="topnav-links">
        <a href="{{ '/signaux.html' | relative_url }}">Signal du mois</a>
        <a href="{{ '/methodologie.html' | relative_url }}">Méthodologie</a>
        <a href="{{ '/#faq' | relative_url }}">FAQ</a>
        <a href="https://github.com/investchill/chillbtc">GitHub</a>
      </div>
    </div>
  </nav>

  <!-- ============== CONTENT ============== -->
  <main class="page-content">
    <div class="wrap">
      <div class="wordmark">CHILLBTC</div>
      {{ content }}
    </div>
  </main>

  <!-- ============== FOOTER ============== -->
  <footer>
    <div class="wrap">
      <p>
        © 2026 ChillBTC ·
        <a href="https://github.com/investchill/chillbtc/blob/main/LICENSE">CC BY-NC-SA 4.0</a> ·
        <a href="mailto:chillbtc@zaclys.net">chillbtc@zaclys.net</a>
      </p>
    </div>
  </footer>

</body>
</html>
