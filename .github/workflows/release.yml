name: Release — build distribution zips

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Stage code/ from engine/
        shell: bash
        run: |
          mkdir -p dist/chillbtc/code
          cp -R engine/src dist/chillbtc/code/
          cp engine/pyproject.toml dist/chillbtc/code/
          cp engine/uv.lock dist/chillbtc/code/
          cp engine/README.md dist/chillbtc/code/
          cp engine/.python-version dist/chillbtc/code/ 2>/dev/null || true
          mkdir -p dist/chillbtc/code/output
          cp engine/output/cascade_position.csv dist/chillbtc/code/output/

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag pour la release : $TAG"

      - name: Build macOS distribution zip
        shell: bash
        run: |
          rm -rf /tmp/stage && mkdir -p /tmp/stage/chillbtc
          cp -R dist/chillbtc/code  /tmp/stage/chillbtc/
          cp -R dist/chillbtc/macos /tmp/stage/chillbtc/
          cp dist/chillbtc/LICENSE  /tmp/stage/chillbtc/
          cp dist/chillbtc/VERSION  /tmp/stage/chillbtc/
          chmod +x /tmp/stage/chillbtc/macos/chill.command
          cd /tmp/stage && zip -qr /tmp/chillbtc-macos.zip chillbtc/
          ls -lh /tmp/chillbtc-macos.zip

      - name: Build Linux distribution zip
        shell: bash
        run: |
          rm -rf /tmp/stage && mkdir -p /tmp/stage/chillbtc
          cp -R dist/chillbtc/code  /tmp/stage/chillbtc/
          cp -R dist/chillbtc/linux /tmp/stage/chillbtc/
          cp dist/chillbtc/LICENSE  /tmp/stage/chillbtc/
          cp dist/chillbtc/VERSION  /tmp/stage/chillbtc/
          chmod +x /tmp/stage/chillbtc/linux/chill.sh
          cd /tmp/stage && zip -qr /tmp/chillbtc-linux.zip chillbtc/
          ls -lh /tmp/chillbtc-linux.zip

      - name: Build Windows distribution zip
        shell: bash
        run: |
          rm -rf /tmp/stage && mkdir -p /tmp/stage/chillbtc
          cp -R dist/chillbtc/code    /tmp/stage/chillbtc/
          cp -R dist/chillbtc/windows /tmp/stage/chillbtc/
          cp dist/chillbtc/LICENSE    /tmp/stage/chillbtc/
          cp dist/chillbtc/VERSION    /tmp/stage/chillbtc/
          cd /tmp/stage && zip -qr /tmp/chillbtc-windows.zip chillbtc/
          ls -lh /tmp/chillbtc-windows.zip

      - name: Zip sanity — verify no leak + expected structure
        shell: bash
        run: |
          for os in macos linux windows; do
            echo "--- Checking chillbtc-$os.zip ---"
            rm -rf /tmp/verify && mkdir -p /tmp/verify
            cd /tmp/verify && unzip -q /tmp/chillbtc-$os.zip
            test -d chillbtc                              || { echo "FAIL: missing chillbtc/"; exit 1; }
            test -d chillbtc/code/src/chillbtc            || { echo "FAIL: missing src/chillbtc/"; exit 1; }
            test -f chillbtc/LICENSE                      || { echo "FAIL: missing LICENSE"; exit 1; }
            test -f chillbtc/VERSION                      || { echo "FAIL: missing VERSION"; exit 1; }
            test -f chillbtc/code/pyproject.toml          || { echo "FAIL: missing pyproject.toml"; exit 1; }
            test -f chillbtc/code/output/cascade_position.csv || { echo "FAIL: missing cascade_position.csv"; exit 1; }
            ! test -e chillbtc/code/.venv                 || { echo "FAIL: .venv leaked"; exit 1; }
            ! test -e chillbtc/code/data                  || { echo "FAIL: data/ leaked"; exit 1; }
            ! test -e chillbtc/code/output/live_journal.csv || { echo "FAIL: live_journal leaked"; exit 1; }
            echo "OK: chillbtc-$os.zip structure verified"
            cd - > /dev/null
          done

      - name: Create GitHub Release with 3 zips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.tag.outputs.TAG }}" \
            --title "ChillBTC ${{ steps.tag.outputs.TAG }}" \
            --notes "Distribution officielle. Télécharger le zip correspondant à ton OS ci-dessous, puis suivre les instructions du site : https://investchill.github.io/chillbtc/" \
            /tmp/chillbtc-macos.zip \
            /tmp/chillbtc-linux.zip \
            /tmp/chillbtc-windows.zip
          echo "Release ${{ steps.tag.outputs.TAG }} créée avec 3 zips attachés."
