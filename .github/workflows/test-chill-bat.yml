name: Smoke test chill.bat (Windows)

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'dist/chillbtc/**'
      - 'engine/**'
      - '.github/workflows/test-chill-bat.yml'

jobs:
  smoke-test-windows:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Stage code/ from engine/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\chillbtc\code | Out-Null
          Copy-Item -Recurse engine\src dist\chillbtc\code\
          Copy-Item engine\pyproject.toml dist\chillbtc\code\
          Copy-Item engine\uv.lock dist\chillbtc\code\
          Copy-Item engine\README.md dist\chillbtc\code\
          if (Test-Path engine\.python-version) { Copy-Item engine\.python-version dist\chillbtc\code\ }
          New-Item -ItemType Directory -Force -Path dist\chillbtc\code\output | Out-Null
          Copy-Item engine\output\cascade_position.csv dist\chillbtc\code\output\

      - name: Show initial machine state
        shell: cmd
        run: |
          echo ==== Probing initial environment ====
          where uv 2>nul && echo WARN: uv already present (unexpected on fresh runner) || echo OK: uv not installed yet
          where python 2>nul && echo Python present (system) || echo No system python
          dir dist\chillbtc
          dir dist\chillbtc\code
          dir dist\chillbtc\windows

      - name: Run chill.bat (cold start, first-time user scenario)
        shell: cmd
        working-directory: dist\chillbtc\windows
        run: chill.bat <NUL
        timeout-minutes: 8

      - name: Verify journal was auto-bootstrapped
        shell: cmd
        working-directory: dist\chillbtc\code
        run: |
          if not exist output\live_journal.csv (
            echo ERROR: live_journal.csv was not created
            exit /b 1
          )
          echo OK: journal created
          for /f %%i in ('find /c /v "" ^< output\live_journal.csv') do echo Lines in journal: %%i

      - name: Re-run chill.bat and capture full output
        shell: cmd
        working-directory: dist\chillbtc\windows
        run: |
          chill.bat > output.txt 2>&1 <NUL
          type output.txt

      - name: Assert output contains expected markers
        shell: cmd
        working-directory: dist\chillbtc\windows
        run: |
          findstr /c:"Signal BTC" output.txt >nul && echo MARKER 1 (Signal BTC): OK || (echo MISSING MARKER 1 & exit /b 1)
          findstr /c:"Recap des" output.txt >nul || findstr /c:"cap des 10" output.txt >nul && echo MARKER 2 (10-mois recap): OK || (echo MISSING MARKER 2 & exit /b 1)
          findstr /c:"annualis" output.txt >nul && echo MARKER 3 (Perf annualisee): OK || (echo MISSING MARKER 3 & exit /b 1)
          findstr /c:"DD max depuis" output.txt >nul && echo MARKER 4 (DD max global): OK || (echo MISSING MARKER 4 & exit /b 1)

      - name: Upload captured output as artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: chill-bat-output
          path: dist\chillbtc\windows\output.txt
          if-no-files-found: ignore

      - name: Build Windows distribution zip
        shell: pwsh
        run: |
          $stage = "$env:RUNNER_TEMP\stage\chillbtc"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Recurse "dist\chillbtc\code"    "$stage\"
          Copy-Item -Recurse "dist\chillbtc\windows" "$stage\"
          Copy-Item "dist\chillbtc\LICENSE"          "$stage\"
          Copy-Item "dist\chillbtc\VERSION"          "$stage\"
          # Remove runtime artifacts so the zip is pristine
          Remove-Item -Recurse -Force "$stage\code\.venv"                 -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$stage\code\data"                  -ErrorAction SilentlyContinue
          Remove-Item -Force         "$stage\code\output\live_journal.csv" -ErrorAction SilentlyContinue
          Remove-Item -Force         "$stage\windows\output.txt"          -ErrorAction SilentlyContinue
          $zipPath = "$env:RUNNER_TEMP\chillbtc-windows.zip"
          Compress-Archive -Path "$env:RUNNER_TEMP\stage\chillbtc" -DestinationPath $zipPath -Force
          Get-Item $zipPath | Format-List Name, Length

      - name: Zip integrity test — structure + file list
        shell: pwsh
        run: |
          $verify = "$env:RUNNER_TEMP\verify"
          Remove-Item -Recurse -Force $verify -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $verify | Out-Null
          Expand-Archive -Path "$env:RUNNER_TEMP\chillbtc-windows.zip" -DestinationPath $verify -Force
          $root = "$verify\chillbtc"
          function Assert-Path($p, $msg) {
            if (-not (Test-Path $p)) { Write-Error "FAIL: $msg ($p)"; exit 1 }
          }
          function Assert-Not-Path($p, $msg) {
            if (Test-Path $p) { Write-Error "FAIL: $msg ($p)"; exit 1 }
          }
          Assert-Path "$root"                                 "missing chillbtc/"
          Assert-Path "$root\code"                            "missing code/"
          Assert-Path "$root\code\src\chillbtc"           "missing src/chillbtc/"
          Assert-Path "$root\windows"                         "missing windows/"
          Assert-Path "$root\LICENSE"                         "missing LICENSE"
          Assert-Path "$root\VERSION"                         "missing VERSION"
          Assert-Path "$root\windows\chill.bat"                 "missing chill.bat"
          Assert-Path "$root\windows\README.md"               "missing windows README"
          Assert-Path "$root\code\pyproject.toml"             "missing pyproject.toml"
          Assert-Path "$root\code\uv.lock"                    "missing uv.lock"
          Assert-Path "$root\code\output\cascade_position.csv" "missing cascade_position.csv"
          Assert-Not-Path "$root\code\.venv"                  ".venv leaked into zip"
          Assert-Not-Path "$root\code\data"                   "data/ leaked into zip"
          Assert-Not-Path "$root\code\output\live_journal.csv" "live_journal leaked"
          Assert-Not-Path "$root\macos"                       "macos/ leaked into Windows zip"
          Assert-Not-Path "$root\linux"                       "linux/ leaked into Windows zip"
          $nPy = (Get-ChildItem -Recurse "$root\code\src" -Filter *.py).Count
          if ($nPy -lt 20) { Write-Error "FAIL: expected >= 20 Python modules, got $nPy"; exit 1 }
          Write-Host "OK: zip structure verified ($nPy Python modules)"
          Get-Item "$env:RUNNER_TEMP\chillbtc-windows.zip" | Format-List Name, Length

      - name: Zip smoke test — run chill.bat from unzipped location
        shell: cmd
        run: |
          cd /d "%RUNNER_TEMP%\verify\chillbtc\windows"
          chill.bat > "%RUNNER_TEMP%\zip-smoke.txt" 2>&1 <NUL
          findstr /c:"Signal BTC" "%RUNNER_TEMP%\zip-smoke.txt" >nul && echo OK: Signal BTC || (echo FAIL: no Signal BTC & type "%RUNNER_TEMP%\zip-smoke.txt" & exit /b 1)
          findstr /c:"annualis" "%RUNNER_TEMP%\zip-smoke.txt" >nul && echo OK: Perf annualisee || (echo FAIL: no Perf annualisee & exit /b 1)
          findstr /c:"DD max depuis" "%RUNNER_TEMP%\zip-smoke.txt" >nul && echo OK: DD max || (echo FAIL: no DD max & exit /b 1)

      - name: Upload distribution zip
        uses: actions/upload-artifact@v5
        with:
          name: chillbtc-windows
          path: ${{ runner.temp }}\chillbtc-windows.zip
          if-no-files-found: error
          retention-days: 90
